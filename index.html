<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瑶姐昭君王</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      color: white;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      background:
        linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)),
        url("./bg.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .box {
      padding: 45px 65px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 18px;
      backdrop-filter: blur(5px);
    }

    h1 {
      font-size: 46px;
      margin-bottom: 18px;
      text-shadow: 0 0 18px #7dd3fc;
    }

    p {
      font-size: 23px;
      color: #e0f2fe;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>瑶姐昭君王</h1>
    <p>因为我很懒，所以就这样。</p>
  </div>
</body>
</html>
