<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瑶姐昭君王的地盘</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      color: white;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;

      background-image: linear-gradient(
        rgba(0, 0, 0, 0.45),
        rgba(0, 0, 0, 0.45)
      ), url("zhaojun-bg.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .box {
      padding: 40px 60px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      text-shadow: 0 0 15px #7dd3fc;
    }

    p {
      font-size: 24px;
      color: #e0f2fe;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>欢迎来到瑶姐昭君王的地盘</h1>
    <p>因为我很懒，所以就这样。</p>
  </div>
</body>
</html>
